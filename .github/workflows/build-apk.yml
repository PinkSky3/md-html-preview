name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps --prefer-offline

    - name: Prebuild Expo project
      run: npx expo prebuild --no-install

    - name: Patch C++ standard for NDK
      run: |
        # React Native 0.81 headers use C++20 (requires keyword),
        # but NDK defaults to C++17 - add flag globally
        if [ -f android/app/build.gradle ]; then
          sed -i '/defaultConfig {/a\            externalNativeBuild {\n                cmake {\n                    arguments "-DCMAKE_CXX_STANDARD=20", "-DCMAKE_CXX_STANDARD_REQUIRED=ON"\n                }\n            }' android/app/build.gradle
        elif [ -f android/app/build.gradle.kts ]; then
          sed -i '/defaultConfig {/a\            externalNativeBuild {\n                cmake {\n                    arguments("-DCMAKE_CXX_STANDARD=20", "-DCMAKE_CXX_STANDARD_REQUIRED=ON")\n                }\n            }' android/app/build.gradle.kts
        fi

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ccache-${{ runner.os }}

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Debug APK
      run: cd android && ./gradlew assembleDebug --parallel --build-cache
      env:
        USE_CCACHE: 1
        CCACHE_DIR: /home/runner/.ccache

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/*.apk
